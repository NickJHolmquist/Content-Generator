name: CTA Reply Pipeline

on:
  # Fires at 11am UTC daily — 2 hours after the 9am thread slot
  # Adjust to match your timezone:
  #   PST (UTC-8): 11am PST = 19:00 UTC → cron "0 19 * * *"
  #   PDT (UTC-7): 11am PDT = 18:00 UTC → cron "0 18 * * *"
  #   EST (UTC-5): 11am EST = 16:00 UTC → cron "0 16 * * *"
  #   EDT (UTC-4): 11am EDT = 15:00 UTC → cron "0 15 * * *"
  schedule:
    - cron: "0 18 * * *"

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  post-cta-replies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Post CTA replies to Threads
        run: node reply.js
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          CTA_TEXT: ${{ vars.CTA_TEXT }}

      # Saves the updated draft.json (with threads_post_id populated)
      # back to the repo so we don't reply twice
      - name: Commit updated draft
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update draft with Threads post IDs [skip ci]"
          file_pattern: "drafts/draft.json"
