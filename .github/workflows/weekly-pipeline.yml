name: Newsletter Pipeline

on:
  # PRIMARY TRIGGER: fired by Kit webhook via the Cloudflare Worker bridge
  # when you publish a broadcast in Kit
  repository_dispatch:
    types: [newsletter_published]

  # FALLBACK: runs every Monday 9am UTC if the webhook somehow didn't fire
  # Also useful while you're getting the webhook bridge set up
  schedule:
    - cron: "0 9 * * 1"

  # Manual trigger from GitHub UI (handy for testing)
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # ── Fetch newsletter from Kit API ─────────────────────────────────────
      # Pulls your latest sent broadcast and writes it to newsletter/inbox/
      # This replaces the manual file drop from the earlier version
      - name: Fetch newsletter from Kit
        run: node scripts/fetch-newsletter.js
        env:
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          NEWSLETTER_DIR: ./newsletter/inbox

      # ── Run the main pipeline ─────────────────────────────────────────────
      - name: Generate content and push to Typefully
        run: node index.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          NEWSLETTER_DIR: ./newsletter/inbox
          PROCESSED_DIR: ./newsletter/processed
          THREADS_PER_NEWSLETTER: 5
          SCHEDULE_OFFSET_DAYS: 1

      # ── Archive the processed newsletter back to the repo ─────────────────
      - name: Commit archived newsletter
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: archive processed newsletter [skip ci]"
          file_pattern: "newsletter/**"
